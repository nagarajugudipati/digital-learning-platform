<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline — Nabha LMS</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: ui-sans-serif, system-ui, sans-serif;
            background: #f9fafb;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }
        .icon {
            width: 80px; height: 80px;
            background: #eef2ff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .icon svg { width: 40px; height: 40px; color: #4f46e5; }
        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .5rem; }
        p  { color: #6b7280; margin-bottom: 2rem; max-width: 340px; line-height: 1.6; }
        a  {
            display: inline-block;
            background: #4f46e5;
            color: #fff;
            text-decoration: none;
            padding: .625rem 1.5rem;
            border-radius: .5rem;
            font-weight: 600;
            font-size: .9rem;
            transition: background .15s;
        }
        a:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="icon">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 16.5A9.5 9.5 0 1 1 12 21m0-9v3m0 3h.01M8.25 9a3.75 3.75 0 1 1 7.5 0c0 2.25-3.75 5.25-3.75 5.25S8.25 11.25 8.25 9z"/>
        </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet connection detected. Previously visited pages are available in your cache.</p>
    <a href="/" onclick="location.reload(); return false;">Try Again</a>
</body>
</html>
